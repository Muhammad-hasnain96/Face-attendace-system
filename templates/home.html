<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Face Recognition Attendance</title>

<style>
* {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* 🔥 Background */
body {
    background: radial-gradient(circle at center, #0a1f44, #020c1b);
    color: white;
}

/* 🔥 Glass Card */
.glass {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 20px rgba(0, 183, 255, 0.2);
}

/* Header */
.header {
    text-align: center;
    padding: 30px;
    font-size: 36px;
    color: #00c3ff;
    text-shadow: 0 0 10px #00c3ff;
}

/* Buttons */
.btn-custom {
    background: linear-gradient(45deg, #00c3ff, #0072ff);
    border: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.btn-custom:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00c3ff;
}

/* Table */
table {
    width: 90%;
    margin: auto;
    border-collapse: collapse;
    overflow: hidden;
    border-radius: 15px;
}

th {
    background: #00c3ff;
    color: black;
}

td, th {
    padding: 12px;
    text-align: center;
}

tr:nth-child(even) {
    background: rgba(255,255,255,0.1);
}

/* Input fields */
input {
    border-radius: 10px;
    border: none;
    padding: 10px;
    width: 250px;
    margin: 10px;
}

#video {
    border-radius: 20px;
    width: 100%;
    max-width: 640px;
    box-shadow: 0 0 20px rgba(0, 195, 255, 0.2);
}

#statusText {
    color: #00c3ff;
    margin-top: 12px;
}

</style>

</head>

<body>

<div class="header">
    Face Recognition Attendance System
</div>

{% if mess %}
<p class="text-center" style="color:red">{{ mess }}</p>
{% endif %}

<div class="container">
    <div class="text-center mb-4">
        <button type="button" id="openCameraBtn" class="btn btn-custom">Open Camera</button>
        <span id="cameraStatus" style="margin-left: 15px; color: #00c3ff;"></span>
    </div>

    <div class="text-center mb-4">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none"></canvas>
    </div>

    <div class="row text-center">

        <!-- Attendance -->
        <div class="col-md-6 p-3">
            <div class="glass p-3">

                <h3 style="color:#00c3ff;">Today's Attendance</h3>

                <button type="button" id="attendanceBtn" class="btn btn-custom mt-3 mb-3">
                    Take Attendance <i class="material-icons">beenhere</i>
                </button>

                <table>
                    <tr>
                        <th>S No</th>
                        <th>Name</th>
                        <th>ID</th>
                        <th>Time</th>
                    </tr>

                    {% if l %}
                    {% for i in range(l) %}
                    <tr>
                        <td>{{ i+1 }}</td>
                        <td>{{ names[i] }}</td>
                        <td>{{ rolls[i] }}</td>
                        <td>{{ times[i] }}</td>
                    </tr>
                    {% endfor %}
                    {% endif %}
                </table>

            </div>
        </div>

        <!-- Add User -->
        <div class="col-md-6 p-3">
            <div class="glass p-3">

                <h3 style="color:#00c3ff;">Add New User</h3>

                <form id="registerForm" onsubmit="event.preventDefault(); registerUser();">
                    <input type="text" id="newusername" name="newusername" placeholder="Enter Name" required>
                    <br>
                    <input type="number" id="newuserid" name="newuserid" placeholder="Enter ID" required>
                    <br>
                    <button type="button" id="registerBtn" class="btn btn-custom mt-2">Register User</button>
                    <h5 class="mt-3">
                        Total Users: {{totalreg}}
                    </h5>
                    <p id="statusText"></p>
                </form>

            </div>
        </div>

    </div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const openCameraBtn = document.getElementById('openCameraBtn');
const registerBtn = document.getElementById('registerBtn');
const attendanceBtn = document.getElementById('attendanceBtn');
const statusText = document.getElementById('statusText');
const cameraStatus = document.getElementById('cameraStatus');
let stream = null;

function setStatus(message, isError = false) {
    statusText.textContent = message;
    statusText.style.color = isError ? '#ff7373' : '#00c3ff';
}

async function openCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        video.srcObject = stream;
        cameraStatus.textContent = 'Camera open';
        setStatus('Camera is ready. Use Register or Take Attendance.');
    } catch (error) {
        cameraStatus.textContent = 'Camera error';
        setStatus('Could not open camera: ' + error.message, true);
    }
}

function captureImage() {
    if (!stream) {
        return null;
    }
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    return canvas.toDataURL('image/jpeg');
}

async function captureFrames(count = 10, delayMs = 300) {
    const frames = [];
    for (let i = 0; i < count; i++) {
        const dataUrl = captureImage();
        if (dataUrl) {
            frames.push(dataUrl);
        }
        await new Promise(resolve => setTimeout(resolve, delayMs));
    }
    return frames;
}

async function registerUser() {
    const newusername = document.getElementById('newusername').value.trim();
    const newuserid = document.getElementById('newuserid').value.trim();
    if (!newusername || !newuserid) {
        setStatus('Enter a name and ID before registering.', true);
        return;
    }
    if (!stream) {
        setStatus('Open the camera first.', true);
        return;
    }

    setStatus('Capturing registration images...');
    const images = await captureFrames(10, 300);
    if (!images.length) {
        setStatus('No images captured. Try again.', true);
        return;
    }

    setStatus('Uploading registration data...');
    const response = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ newusername, newuserid, images })
    });
    const result = await response.json();
    if (result.success) {
        setStatus(result.message);
        setTimeout(() => window.location.reload(), 1200);
    } else {
        setStatus(result.message, true);
    }
}

async function takeAttendance() {
    if (!stream) {
        setStatus('Open the camera first.', true);
        return;
    }
    setStatus('Capturing attendance image...');
    const image = captureImage();
    if (!image) {
        setStatus('Could not capture image.', true);
        return;
    }
    const response = await fetch('/recognize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image })
    });
    const result = await response.json();
    if (result.success) {
        setStatus(result.message);
        setTimeout(() => window.location.reload(), 1200);
    } else {
        setStatus(result.message, true);
    }
}

openCameraBtn.addEventListener('click', openCamera);
registerBtn.addEventListener('click', registerUser);
attendanceBtn.addEventListener('click', takeAttendance);
</script>

</body>
</html>
